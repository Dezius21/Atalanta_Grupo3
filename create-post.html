<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Noticia</title>
  <link rel="stylesheet" href="blocks/posts.css">
</head>
<body>

  <header class="header">
    <nav class="navbar">
      <a href="./index.html" class="navbar__logo-conatiner">
        <img src="" alt="" class="navbar__logo">
      </a>
      <ul class="navbar__list">
        <li class="navbar__item">Quiénes somos</li>
        <li class="navbar__item">
          Servicios
          <ul class="dropdown-items">
            <li class="dropdown-items__item">Ciberseguridad</li>
            <li class="dropdown-items__item">Digital</li>
            <li class="dropdown-items__item">Formación</li>
          </ul>
        </li>
        <li class="navbar__item">Empleo</li>
        <li class="navbar__item"><a href="noticias.html">Noticias</a></li>
        <li class="navbar__item">Contacto</li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <h1>Nueva Noticia</h1>
    <div class="form-group">
      <label for="titulo">Título</label>
      <input type="text" id="titulo" placeholder="Título de la noticia" maxlength="255">
    </div>
    <div class="form-group">
      <label for="contenido">Contenido</label>
      <textarea id="contenido" placeholder="Escribe el contenido aquí..."></textarea>
    </div>
    <div class="form-group">
      <label for="imagen">Imagen (opcional)</label>
      <input type="file" id="imagen" accept="imagen/*">
    </div>
    <button class="btn btn-primary" id="submitBtn">Publicar</button>
    <p id="statusMsg"></p>
  </div>

  <script src="scripts/create-post.js"></script>
</body>
</html>
